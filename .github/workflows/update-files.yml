name: Update Files
on:
  push:
    branches:
      - main
      - update-ltg
  workflow_dispatch:
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
jobs:
  generatetex:
    runs-on: ubuntu-latest
    strategy:
      # English provides the full set of shared files (README, check.yml, …);
      # German contributes only its main-de.tex.
      max-parallel: 1
      matrix:
        lang: [en, de]
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
          ref: '${{ github.event.pull_request.head.ref }}'
          # PAT with workflow scope so the bot can push regenerated .github/workflows/check.yml
          token: ${{ secrets.GH_TOKEN_WRITE }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'generator-latex-template/package-lock.json'
      - name: Make generator available globally
        working-directory: ${{ github.workspace }}/generator-latex-template
        run: |
          npm install
          npm link
          npm install -g yo
      - run: mkdir /tmp/ltg
      - name: Generate template
        shell: bash
        working-directory: /tmp/ltg
        run: |
          yo $GITHUB_WORKSPACE/generator-latex-template/generators/app/index.js \
           --githubpublish\
           --docker=iot\
           --documentclass=mwe\
           --papersize=a4\
           --latexcompiler=lualatex\
           --bibtextool=biblatex\
           --overleaf=true\
           --texlive=2026\
           --lang=${{ matrix.lang }}\
           --listings=listings\
           --enquotes=csquotes\
           --tweakouterquote=babel\
           --todo=none\
           --examples=false\
           --howtotext=false
        env:
          yeoman_test: false
      - name: Prepare files
        working-directory: /tmp/ltg
        run: |
          if [ "${{ matrix.lang }}" == "de" ]; then
            # mwe always emits main.tex; keep the German one as main-de.tex and
            # let the English job own every shared file.
            mv main.tex main-de.tex
            cp main-de.tex "$GITHUB_WORKSPACE/main-de.tex"
          else
            # the LICENSE of the repository should be kept
            rm LICENSE
            cp -r * "$GITHUB_WORKSPACE"
            cp -r .* "$GITHUB_WORKSPACE"
          fi
          cd "$GITHUB_WORKSPACE"
          git status
          git diff
      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          message: 'Update files based on generated files by template generator'
          author_name: 'github-actions[bot]'
          author_email: 'github-actions[bot]@users.noreply.github.com'
          push: false
      - name: Push changes
        run: |
          parallel --retries 10 --delay 9 ::: "git pull --rebase; git push"
  build:
    runs-on: ubuntu-latest
    needs: [generatetex]
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v7
        with:
          ref: '${{ github.event.pull_request.head.ref }}'
      - run: |
          # ensure latest updates
          git pull
          # latexmkrc is shipped as _latexmkrc for easy Overleaf usage
          cp _latexmkrc latexmkrc
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          package_file: '${{ github.workspace }}/Texlivefile'
      - name: Prepare latexmk
        run: |
          updmap -sys
          texhash
          tlmgr generate language --rebuild-sys
      - name: Build every main (English + German)
        run: |
          for doc in main*.tex; do
            latexmk "$doc"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## $doc" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            texlogsieve < "${doc%.tex}.log" >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done
      - uses: actions/upload-artifact@v7
        with:
          name: pdfs
          path: 'main*.pdf'
