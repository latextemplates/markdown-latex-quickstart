name: check-markdown
on:
  pull_request:
  push:
    branches:
      - main
      - update-ltg
  workflow_dispatch:
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v7
      - name: Lint the Markdown manuscript
        uses: vale-cli/vale-action@v2.1.1
        with:
          files: manuscript.md
          reporter: github-check
          fail_on_error: true
