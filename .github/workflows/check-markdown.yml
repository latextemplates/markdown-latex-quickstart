name: check-markdown
on:
  pull_request:
  push:
    branches:
      - main
      - update-ltg
  workflow_dispatch:
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v7
      - name: Install Vale
        run: |
          VALE_VERSION=3.15.1
          curl -sL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" | tar -xz vale
          ./vale --version
      - name: Lint the Markdown manuscript
        run: |
          # The prose is a plain Markdown file. Vale is a spell-checker, so strip
          # the few inline LaTeX commands (\zcref, \LaTeX) it would otherwise flag
          # as misspellings. The substitution is per-line, so line numbers are
          # preserved and findings map straight back to manuscript.md — no block
          # extraction or offset. German (manuscript-de.md) is skipped: these
          # checks target English.
          mkdir -p .vale-content
          sed -E 's/\\[A-Za-z@]+\*?(\{[^}]*\})?//g' manuscript.md > .vale-content/manuscript.md

          ./vale --output=JSON .vale-content > vale.json || true

          # Emit GitHub workflow-command annotations anchored to manuscript.md
          # (https://docs.github.com/actions/reference/workflows-and-actions/workflow-commands#setting-an-error-message)
          jq -r '
            to_entries[] | .value[] |
            "::" + (if .Severity == "error" then "error"
                    elif .Severity == "warning" then "warning"
                    else "notice" end) +
            " file=manuscript.md,line=" + (.Line | tostring) +
            ",col=" + (.Span[0] | tostring) +
            "::[Vale] " + .Check + ": " + .Message
          ' vale.json | tee annotations.txt

          count=$(wc -l < annotations.txt)
          echo "Vale reported ${count} finding(s) in manuscript.md." >> "$GITHUB_STEP_SUMMARY"
