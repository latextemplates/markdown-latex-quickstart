name: check-textlint
on:
  pull_request:
  push:
    branches:
      - main
      - update-ltg
  workflow_dispatch:
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Lint the Markdown manuscript with textlint
        run: |
          # The prose is a plain Markdown file, so textlint runs on it directly —
          # the reported line/column already point at manuscript.md, no extraction
          # or offset needed. Rules come from .textlintrc.json. German
          # (manuscript-de.md) is skipped: the write-good/terminology rules target
          # English.
          npx --yes \
            --package textlint \
            --package textlint-rule-terminology \
            --package textlint-rule-write-good \
            textlint --format json manuscript.md > textlint.json || true

          # Emit GitHub workflow-command annotations anchored to manuscript.md
          # (https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-commands#setting-an-error-message)
          jq -r '
            .[].messages[] |
            "::warning file=manuscript.md,line=" + (.line | tostring) +
            ",col=" + (.column | tostring) +
            "::[textlint] " + .ruleId + ": " + .message
          ' textlint.json | tee annotations.txt

          echo "textlint reported $(wc -l < annotations.txt) finding(s) in manuscript.md." >> "$GITHUB_STEP_SUMMARY"
