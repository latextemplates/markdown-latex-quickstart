name: check-textlint
on:
  pull_request:
  push:
    branches:
      - main
      - update-ltg
  workflow_dispatch:
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Lint the Markdown manuscript with textlint
        run: |
          # The prose is a plain Markdown file, so textlint runs on it directly —
          # the reported line/column already point at manuscript.md, no extraction
          # or offset needed. Rules come from .textlintrc.json. textlint's built-in
          # `github` formatter emits the ::error/::warning workflow-command
          # annotations itself, so there is no JSON/jq post-processing. It prints
          # absolute paths (result.filePath), so strip the workspace prefix to
          # anchor the annotations to manuscript.md in the diff. German
          # (manuscript-de.md) is skipped: the write-good/terminology rules target
          # English.
          npx --yes \
            --package textlint \
            --package textlint-rule-terminology \
            --package textlint-rule-write-good \
            textlint --format github manuscript.md \
            | sed "s|${GITHUB_WORKSPACE}/||g" | tee annotations.txt || true
          count=$(grep -c '^::' annotations.txt || true)
          echo "textlint reported ${count} finding(s) in manuscript.md." >> "$GITHUB_STEP_SUMMARY"
